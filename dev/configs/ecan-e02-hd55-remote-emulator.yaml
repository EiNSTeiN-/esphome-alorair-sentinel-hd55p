substitutions:
  name: alorair-hd55-remote
  friendly_name: AlorAir HD55 Remote Diagnostic
  name_add_mac_suffix: "true"
  ecan_e02_project_name: einstein.alorair_hd55p
  ecan_e02_project_version: "0.1.0"
  ecan_e02_import_url: github://EiNSTeiN-/esphome-alorair-sentinel-hd55p/configs/alorair-hd55p-ecan-e02.yaml@main

  can_bit_rate: 50KBPS
  can_mode: NORMAL
  can_node_id: "0x05"
  hd55_remote_humidity: "50"
  hd55_remote_temperature_c: "20"

packages:
  ecan_e02: github://EiNSTeiN-/esphome-ecan-e02/packages/ecan-e02-base.yaml@main

external_components:
  - source: github://EiNSTeiN-/esphome-ecan-e02@main
    components: [ecan_e02]

esphome:
  comment: "AlorAir HD55 50 kbit/s remote-panel emulator diagnostic using Ebyte ECAN-E02"

ecan_e02:
  twai_status_monitor: true
  update_interval: 10s

interval:
  - interval: 1s
    then:
      - script.execute: pulse_can_led
      - lambda: |-
          static uint32_t tx_count = 0;
          tx_count++;
          const uint8_t remote_humidity = static_cast<uint8_t>(${hd55_remote_humidity});
          const uint8_t remote_temperature = static_cast<uint8_t>(${hd55_remote_temperature_c});
          id(can_tx_test_frames)++;
          if (tx_count == 1 || tx_count % 10 == 0) {
            ESP_LOGI("hd55_can", "tx remote idle id=0x123 data=01 00 00 %02X %02X 00 00 00",
                     remote_humidity, remote_temperature);
          }
          const std::vector<uint8_t> data{
              0x01, 0x00, 0x00, remote_humidity, remote_temperature, 0x00, 0x00, 0x00};
          id(can0)->send_data(0x123, false, data);

  - interval: 1s
    then:
      - lambda: |-
          static std::string previous_frame;
          const std::string frame = id(can_last_frame).state;
          if (frame.empty() || frame == previous_frame) {
            return;
          }
          previous_frame = frame;
          ESP_LOGI("hd55_can", "rx %s", frame.c_str());
