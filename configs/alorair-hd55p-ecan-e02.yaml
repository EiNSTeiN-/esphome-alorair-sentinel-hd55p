substitutions:
  name: alorair-hd55p
  friendly_name: AlorAir HD55P
  name_add_mac_suffix: "true"
  ecan_e02_project_name: einstein.alorair_hd55p
  ecan_e02_project_version: "0.1.0"
  ecan_e02_import_url: github://EiNSTeiN-/esphome-alorair-sentinel-hd55p/configs/alorair-hd55p-ecan-e02.yaml@main

  # Confirmed on the bench with an HD55P remote/CAN port. Some newer reports use 125KBPS.
  can_bit_rate: 50KBPS
  can_mode: NORMAL
  can_node_id: "0x05"
  hd55_poll_interval: 5s
  hd55_remote_humidity: "50"
  hd55_remote_temperature_c: "20"

packages:
  ecan_e02: github://EiNSTeiN-/esphome-ecan-e02/packages/ecan-e02-base.yaml@main

external_components:
  - source: github://EiNSTeiN-/esphome-ecan-e02@main
    components: [ecan_e02]
  - source: github://EiNSTeiN-/esphome-alorair-sentinel-hd55p@main
    components: [alorair_hd55p]

esphome:
  comment: "AlorAir Sentinel HD55P / HD55-family CAN monitor using Ebyte ECAN-E02"

globals:
  - id: hd55_power
    type: bool
    restore_value: false
    initial_value: "false"
  - id: hd55_continuous
    type: bool
    restore_value: false
    initial_value: "false"
  - id: hd55_dehumidifying
    type: bool
    restore_value: false
    initial_value: "false"
  - id: hd55_power_command_pending_on
    type: bool
    restore_value: false
    initial_value: "false"
  - id: hd55_power_command_pending_off
    type: bool
    restore_value: false
    initial_value: "false"
  - id: hd55_power_command_since_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: hd55_standby_since_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
script:
  - id: hd55_send_idle_remote_frame
    mode: restart
    then:
      - script.execute: pulse_can_led
      - lambda: |-
          const uint8_t remote_humidity = static_cast<uint8_t>(${hd55_remote_humidity});
          const uint8_t remote_temperature = static_cast<uint8_t>(${hd55_remote_temperature_c});
          const std::vector<uint8_t> data{
              0x01, 0x00, 0x00, remote_humidity, remote_temperature, 0x00, 0x00, 0x00};
          id(can_tx_test_frames)++;
          id(can0)->send_data(0x123, false, data);

  - id: hd55_send_setpoint_frame
    mode: restart
    parameters:
      setpoint: float
    then:
      - lambda: |-
          const uint8_t setpoint_byte = static_cast<uint8_t>(setpoint);
          const uint8_t remote_humidity = static_cast<uint8_t>(${hd55_remote_humidity});
          const uint8_t remote_temperature = static_cast<uint8_t>(${hd55_remote_temperature_c});
          const std::vector<uint8_t> data{0x01, 0x05, setpoint_byte, remote_humidity, remote_temperature, 0x00, 0x00, 0x00};
          char frame[128];
          snprintf(frame, sizeof(frame),
                   "setpoint_remote id=0x00000123 rtr=false len=8 data=%02X %02X %02X %02X %02X %02X %02X %02X",
                   data[0], data[1], data[2], data[3], data[4], data[5], data[6], data[7]);
          ESP_LOGI("hd55_can", "tx %s", frame);
          id(hd55_last_command_frame).publish_state(frame);
          id(can_tx_test_frames)++;
          id(can0)->send_data(0x123, false, data);
      - delay: 200ms
      - script.execute: hd55_send_idle_remote_frame

  - id: hd55_command_power_on
    mode: restart
    then:
      - lambda: |-
          const uint8_t remote_humidity = static_cast<uint8_t>(${hd55_remote_humidity});
          const uint8_t remote_temperature = static_cast<uint8_t>(${hd55_remote_temperature_c});
          const std::vector<uint8_t> data{0x01, 0x01, 0x01, remote_humidity, remote_temperature, 0x00, 0x00, 0x00};
          char frame[128];
          snprintf(frame, sizeof(frame),
                   "power_on_remote id=0x00000123 rtr=false len=8 data=%02X %02X %02X %02X %02X %02X %02X %02X",
                   data[0], data[1], data[2], data[3], data[4], data[5], data[6], data[7]);
          ESP_LOGI("hd55_can", "tx %s", frame);
          id(hd55_last_command_frame).publish_state(frame);
          id(can_tx_test_frames)++;
          id(can0)->send_data(0x123, false, data);
          id(hd55_power_command_pending_on) = true;
          id(hd55_power_command_pending_off) = false;
          id(hd55_power_command_since_ms) = millis();
      - switch.template.publish:
          id: hd55_power_command_switch
          state: false
      - delay: 200ms
      - script.execute: hd55_send_idle_remote_frame

  - id: hd55_command_power_off
    mode: restart
    then:
      - lambda: |-
          const uint8_t remote_humidity = static_cast<uint8_t>(${hd55_remote_humidity});
          const uint8_t remote_temperature = static_cast<uint8_t>(${hd55_remote_temperature_c});
          const std::vector<uint8_t> data{0x01, 0x01, 0x00, remote_humidity, remote_temperature, 0x00, 0x00, 0x00};
          char frame[128];
          snprintf(frame, sizeof(frame),
                   "power_off_remote id=0x00000123 rtr=false len=8 data=%02X %02X %02X %02X %02X %02X %02X %02X",
                   data[0], data[1], data[2], data[3], data[4], data[5], data[6], data[7]);
          ESP_LOGI("hd55_can", "tx %s", frame);
          id(hd55_last_command_frame).publish_state(frame);
          id(can_tx_test_frames)++;
          id(can0)->send_data(0x123, false, data);
          id(hd55_power_command_pending_on) = false;
          id(hd55_power_command_pending_off) = true;
          id(hd55_power_command_since_ms) = millis();
          id(hd55_standby_since_ms) = 0;
      - switch.template.publish:
          id: hd55_power_command_switch
          state: true
      - delay: 200ms
      - script.execute: hd55_send_idle_remote_frame

interval:
  - interval: ${hd55_poll_interval}
    then:
      - script.execute: hd55_send_idle_remote_frame

canbus:
  - id: !extend can0
    on_frame:
      - can_id: 0x123
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              if (remote_transmission_request || x.size() < 8) {
                return;
              }

              // Confirmed HD55P 50KBPS remote-panel response:
              // RH, setpoint, remote/display RH, temp C, volatile D4, display/status D5, D6, D7.
              // D4 changes while the machine state is steady, so do not use it as the state bitfield.
              if (x[0] < 20 || x[0] > 100 || x[1] < 20 || x[1] > 100 || x[3] > 60) {
                return;
              }

              const uint8_t status = x[5];
              const uint8_t persistent_status = status & 0x3F;
              const bool power = persistent_status != 0;
              const bool dehumidifying = (status & 0x01) != 0;
              const bool continuous = (status & 0x08) != 0;
              const bool pumping = (status & 0x10) != 0;
              const bool display_local = (status & 0x40) != 0;
              const uint32_t now = millis();
              const bool standby = power && !dehumidifying;

              id(hd55_power) = power;
              id(hd55_continuous) = continuous;
              id(hd55_dehumidifying) = dehumidifying;
              id(hd55_climate).update_from_can(x[0], x[1], x[3], dehumidifying);
              id(hd55_humidity).publish_state(x[0]);
              id(hd55_setpoint_actual).publish_state(x[1]);
              id(hd55_temperature).publish_state(x[3]);
              id(hd55_raw_byte_2).publish_state(x[2]);
              id(hd55_raw_byte_4).publish_state(x[4]);
              id(hd55_status_byte).publish_state(status);
              id(hd55_raw_byte_5).publish_state(x[5]);
              id(hd55_raw_byte_6).publish_state(x[6]);
              id(hd55_raw_byte_7).publish_state(x[7]);
              id(hd55_power_sensor).publish_state(power);
              id(hd55_dehumidifying_sensor).publish_state(dehumidifying);
              id(hd55_continuous_sensor).publish_state(continuous);
              id(hd55_pumping_sensor).publish_state(pumping);
              id(hd55_display_local_sensor).publish_state(display_local);

              if (standby) {
                if (id(hd55_standby_since_ms) == 0) {
                  id(hd55_standby_since_ms) = now;
                }
              } else {
                id(hd55_standby_since_ms) = 0;
              }

              const uint32_t command_elapsed = static_cast<uint32_t>(now - id(hd55_power_command_since_ms));
              if (id(hd55_power_command_pending_on) && command_elapsed >= 130000) {
                id(hd55_power_command_pending_on) = false;
                id(hd55_power_command_switch).publish_state(true);
              }
              if (id(hd55_power_command_pending_off)) {
                const bool standby_held =
                    standby && id(hd55_standby_since_ms) != 0 &&
                    static_cast<uint32_t>(now - id(hd55_standby_since_ms)) >= 120000;
                const bool quiet_timeout = !dehumidifying && command_elapsed >= 150000;
                if (!power || standby_held || quiet_timeout) {
                  id(hd55_power_command_pending_off) = false;
                  id(hd55_power_command_switch).publish_state(false);
                }
              }
              if (!id(hd55_power_command_pending_on) && !id(hd55_power_command_pending_off)) {
                if (id(hd55_power_command_switch).state != power) {
                  id(hd55_power_command_switch).publish_state(power);
                }
              }

              std::string status_text;
              if (dehumidifying && pumping) {
                status_text = continuous ? "Continuous dehumidifying, pumping" : "Dehumidifying, pumping";
              } else if (dehumidifying) {
                status_text = continuous ? "Continuous dehumidifying" : "Dehumidifying";
              } else if (pumping) {
                status_text = power ? "Standby, pumping" : "Off, pumping";
              } else if (power) {
                status_text = continuous ? "Continuous standby" : "Standby";
              } else if (continuous) {
                status_text = "Continuous off";
              } else {
                status_text = "Off";
              }
              id(hd55_status_text).publish_state(status_text);

climate:
  - platform: alorair_hd55p
    id: hd55_climate
    name: ${friendly_name} Dehumidifier
    visual:
      min_humidity: 35%
      max_humidity: 99%
      min_temperature: 0 °C
      max_temperature: 40 °C
      temperature_step:
        target_temperature: 1 °C
        current_temperature: 1 °C
    turn_on_action:
      - script.execute: hd55_command_power_on
    turn_off_action:
      - script.execute: hd55_command_power_off
    target_humidity_change_action:
      - script.execute:
          id: hd55_send_setpoint_frame
          setpoint: !lambda return x;

sensor:
  - platform: template
    id: hd55_humidity
    name: ${friendly_name} Humidity
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 0

  - platform: template
    id: hd55_setpoint_actual
    name: ${friendly_name} Current Setpoint
    unit_of_measurement: "%"
    device_class: humidity
    accuracy_decimals: 0

  - platform: template
    id: hd55_temperature
    name: ${friendly_name} Temperature
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0

  - platform: template
    id: hd55_status_byte
    name: ${friendly_name} Status Byte
    disabled_by_default: true
    accuracy_decimals: 0

  - platform: template
    id: hd55_raw_byte_2
    name: ${friendly_name} Raw Byte 2
    disabled_by_default: true
    accuracy_decimals: 0

  - platform: template
    id: hd55_raw_byte_4
    name: ${friendly_name} Raw Byte 4
    disabled_by_default: true
    accuracy_decimals: 0

  - platform: template
    id: hd55_raw_byte_5
    name: ${friendly_name} Raw Byte 5
    disabled_by_default: true
    accuracy_decimals: 0

  - platform: template
    id: hd55_raw_byte_6
    name: ${friendly_name} Raw Byte 6
    disabled_by_default: true
    accuracy_decimals: 0

  - platform: template
    id: hd55_raw_byte_7
    name: ${friendly_name} Raw Byte 7
    disabled_by_default: true
    accuracy_decimals: 0

binary_sensor:
  - platform: template
    id: hd55_power_sensor
    name: ${friendly_name} Power
    device_class: power

  - platform: template
    id: hd55_dehumidifying_sensor
    name: ${friendly_name} Dehumidifying

  - platform: template
    id: hd55_continuous_sensor
    name: ${friendly_name} Continuous Mode

  - platform: template
    id: hd55_pumping_sensor
    name: ${friendly_name} Pumping

  - platform: template
    id: hd55_display_local_sensor
    name: ${friendly_name} Display Local Measurements
    disabled_by_default: true

text_sensor:
  - platform: template
    id: hd55_status_text
    name: ${friendly_name} Status

  - platform: template
    id: hd55_last_command_frame
    name: ${friendly_name} CAN Last Command Frame
    disabled_by_default: true

number:
  - platform: template
    id: hd55_setpoint_control
    name: ${friendly_name} Humidity Setpoint
    min_value: 35
    max_value: 99
    step: 1
    lambda: |-
      if (id(hd55_setpoint_actual).has_state()) {
        return id(hd55_setpoint_actual).state;
      }
      return {};
    optimistic: false
    unit_of_measurement: "%"
    device_class: humidity
    set_action:
      - script.execute:
          id: hd55_send_setpoint_frame
          setpoint: !lambda return x;

switch:
  - platform: template
    id: hd55_power_command_switch
    name: ${friendly_name} Power Command Switch
    restore_mode: DISABLED
    assumed_state: true
    turn_on_action:
      - script.execute: hd55_command_power_on
    turn_off_action:
      - script.execute: hd55_command_power_off

  - platform: template
    id: hd55_continuous_switch
    name: ${friendly_name} Continuous Mode Switch
    lambda: return id(hd55_continuous);
    restore_mode: DISABLED
    turn_on_action:
      - if:
          condition:
            lambda: return !id(hd55_continuous);
          then:
            - lambda: |-
                const uint8_t remote_humidity = static_cast<uint8_t>(${hd55_remote_humidity});
                const uint8_t remote_temperature = static_cast<uint8_t>(${hd55_remote_temperature_c});
                const std::vector<uint8_t> data{0x01, 0x03, 0x01, remote_humidity, remote_temperature, 0x00, 0x00, 0x00};
                char frame[128];
                snprintf(frame, sizeof(frame),
                         "continuous_on_remote id=0x00000123 rtr=false len=8 data=%02X %02X %02X %02X %02X %02X %02X %02X",
                         data[0], data[1], data[2], data[3], data[4], data[5], data[6], data[7]);
                ESP_LOGI("hd55_can", "tx %s", frame);
                id(hd55_last_command_frame).publish_state(frame);
                id(can_tx_test_frames)++;
                id(can0)->send_data(0x123, false, data);
            - delay: 200ms
            - script.execute: hd55_send_idle_remote_frame
    turn_off_action:
      - if:
          condition:
            lambda: return id(hd55_continuous);
          then:
            - lambda: |-
                const uint8_t remote_humidity = static_cast<uint8_t>(${hd55_remote_humidity});
                const uint8_t remote_temperature = static_cast<uint8_t>(${hd55_remote_temperature_c});
                const std::vector<uint8_t> data{0x01, 0x03, 0x01, remote_humidity, remote_temperature, 0x00, 0x00, 0x00};
                char frame[128];
                snprintf(frame, sizeof(frame),
                         "continuous_off_remote id=0x00000123 rtr=false len=8 data=%02X %02X %02X %02X %02X %02X %02X %02X",
                         data[0], data[1], data[2], data[3], data[4], data[5], data[6], data[7]);
                ESP_LOGI("hd55_can", "tx %s", frame);
                id(hd55_last_command_frame).publish_state(frame);
                id(can_tx_test_frames)++;
                id(can0)->send_data(0x123, false, data);
            - delay: 200ms
            - script.execute: hd55_send_idle_remote_frame

button:
  - platform: template
    id: hd55_turn_on_button
    name: ${friendly_name} Turn On
    on_press:
      - climate.control:
          id: hd55_climate
          mode: DRY

  - platform: template
    id: hd55_turn_off_button
    name: ${friendly_name} Turn Off
    on_press:
      - climate.control:
          id: hd55_climate
          mode: "OFF"

  - platform: template
    name: ${friendly_name} Drain Pump Toggle
    disabled_by_default: true
    on_press:
      - lambda: |-
          const uint8_t remote_humidity = static_cast<uint8_t>(${hd55_remote_humidity});
          const uint8_t remote_temperature = static_cast<uint8_t>(${hd55_remote_temperature_c});
          const std::vector<uint8_t> data{0x01, 0x02, 0x01, remote_humidity, remote_temperature, 0x00, 0x00, 0x00};
          char frame[128];
          snprintf(frame, sizeof(frame),
                   "drain_pump_remote id=0x00000123 rtr=false len=8 data=%02X %02X %02X %02X %02X %02X %02X %02X",
                   data[0], data[1], data[2], data[3], data[4], data[5], data[6], data[7]);
          ESP_LOGI("hd55_can", "tx %s", frame);
          id(hd55_last_command_frame).publish_state(frame);
          id(can_tx_test_frames)++;
          id(can0)->send_data(0x123, false, data);
      - delay: 200ms
      - script.execute: hd55_send_idle_remote_frame

  - platform: template
    name: ${friendly_name} Sensor Source Button
    disabled_by_default: true
    on_press:
      - lambda: |-
          const uint8_t remote_humidity = static_cast<uint8_t>(${hd55_remote_humidity});
          const uint8_t remote_temperature = static_cast<uint8_t>(${hd55_remote_temperature_c});
          const std::vector<uint8_t> data{0x01, 0x04, 0x01, remote_humidity, remote_temperature, 0x00, 0x00, 0x00};
          char frame[128];
          snprintf(frame, sizeof(frame),
                   "sensor_source_remote id=0x00000123 rtr=false len=8 data=%02X %02X %02X %02X %02X %02X %02X %02X",
                   data[0], data[1], data[2], data[3], data[4], data[5], data[6], data[7]);
          ESP_LOGI("hd55_can", "tx %s", frame);
          id(hd55_last_command_frame).publish_state(frame);
          id(can_tx_test_frames)++;
          id(can0)->send_data(0x123, false, data);
      - delay: 200ms
      - script.execute: hd55_send_idle_remote_frame
